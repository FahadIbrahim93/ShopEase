name: Bug
description: Report a defect.
title: "[BUG] "
labels: ["type:bug", "priority:p1"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: User/business impact
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs/screenshots/trace evidence
